# External skills bootstrapped at install/update time.
# Sources are pinned to immutable commit SHAs for reproducible results.
#
# Security:
# - commit: MUST be full 40-char SHA-1 or 64-char SHA-256 hash (not branch/tag)
# - checksum: Optional SHA256 of SKILL.md for integrity verification
# - path: Validated against directory traversal attacks
# - Files limited to 100 per source, max depth 10 directories
# - Network timeouts: 10s connect, 30s total per request

