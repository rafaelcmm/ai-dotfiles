name: Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-linux-x86_64
          workspaces: |
            . -> target

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: ai-dotfiles
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: ai-dotfiles
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: ai-dotfiles.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cargo-${{ matrix.target }}
          workspaces: |
            . -> target/${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ASSET="ai-dotfiles-${{ matrix.target }}.${{ matrix.archive_ext }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" .
          tar -czf "$ASSET" "${{ matrix.binary_name }}"
          shasum -a 256 "$ASSET" > "$ASSET.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "ai-dotfiles-${{ matrix.target }}.${{ matrix.archive_ext }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" .
          Compress-Archive -Path "${{ matrix.binary_name }}" -DestinationPath $asset -Force
          (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower() + "  " + $asset | Out-File -FilePath "$asset.sha256" -NoNewline -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ai-dotfiles-${{ matrix.target }}.${{ matrix.archive_ext }}
            ai-dotfiles-${{ matrix.target }}.${{ matrix.archive_ext }}.sha256

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          find dist -name '*.sha256' -type f -exec cat {} \; > dist/SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/SHA256SUMS
